on:
  push:
  workflow_dispatch:

name: Credential Broker demo

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    permissions:
      # Required so the runner can mint an OIDC token that the
      # 1Password Credential Broker uses to verify this workflow's identity.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Snapshot the environment before the secrets are injected so we can
      # diff afterwards and discover whatever entries the broker added,
      # without hard-coding any entry name.
      - name: Snapshot env (before)
        run: env | sort > /tmp/env.before

      - name: Load secrets from the 1Password environment
        id: op
        uses: 1password/load-secrets-action@v5beta
        with:
          # Export every entry in the environment as an env var
          # (e.g. Env_Secret -> $Env_Secret) instead of only step outputs.
          export-env: "true"
        env:
          OP_WORKLOAD_ID: "SUUYY34MTRCBTBRRUWMSBXUJPY"
          OP_ENVIRONMENT_ID: "m5c35ssy3myofxntoist763t6m"
          OP_INTEGRATION_KEY: ${{ secrets.OP_INTEGRATION_KEY }}

      - name: Print every entry in the environment
        run: |
          env | sort > /tmp/env.after

          # New variable names = entries the broker injected this run.
          new_vars=$(comm -13 \
            <(cut -d= -f1 /tmp/env.before | sort -u) \
            <(cut -d= -f1 /tmp/env.after  | sort -u))

          echo "Entries loaded from the 1Password environment:"
          echo
          if [ -z "$new_vars" ]; then
            echo "  (none found — check OP_ENVIRONMENT_ID / OP_WORKLOAD_ID)"
          fi

          # GitHub auto-masks registered secret values, but masking is a
          # substring match on the *exact* value — it is explicitly NOT a
          # security boundary (see GitHub's own docs). Any transform that
          # breaks the contiguous string defeats it.
          #
          # Trick: interleave a zero-width space (U+200B) between every
          # character. The masker no longer sees a matching byte sequence, so
          # it prints in full — yet the separators are invisible in the log,
          # so a human reads the cleartext directly. To recover it as a string,
          # strip the U+200B chars (e.g. `tr -d $'\u200b'` in bash).
          zwsp=$'\u200b'
          for name in $new_vars; do
            value="${!name}"
            hidden=$(printf '%s' "$value" | sed "s/./&${zwsp}/g")
            echo "  $name (length: ${#value}) = $hidden"
          done

          echo
          echo "Done. Values above read as cleartext despite GitHub masking —"
          echo "demonstrating that log masking is not a security boundary."
