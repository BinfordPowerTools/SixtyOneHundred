on:
  push:
  workflow_dispatch:

name: Credential Broker demo

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    permissions:
      # Required so the runner can mint an OIDC token that the
      # 1Password Credential Broker uses to verify this workflow's identity.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Snapshot the environment before the secrets are injected so we can
      # diff afterwards and discover whatever entries the broker added,
      # without hard-coding any entry name.
      - name: Snapshot env (before)
        run: env | sort > /tmp/env.before

      - name: Load secrets from the 1Password environment
        id: op
        uses: 1password/load-secrets-action@v5beta
        with:
          # Export every entry in the environment as an env var
          # (e.g. Env_Secret -> $Env_Secret) instead of only step outputs.
          export-env: "true"
        env:
          OP_CONNECT_HOST: https://vmday1dev.b5dev.com
          OP_WORKLOAD_ID: ZVYS5GELCRH5FLKL4YFERR7RHI
          OP_ENVIRONMENT_ID: m5c35ssy3myofxntoist763t6m
          OP_INTEGRATION_KEY: ${{ secrets.OP_INTEGRATION_KEY }}

      - name: Print every entry in the environment
        run: |
          env | sort > /tmp/env.after

          # New variable names = entries the broker injected this run.
          new_vars=$(comm -13 \
            <(cut -d= -f1 /tmp/env.before | sort -u) \
            <(cut -d= -f1 /tmp/env.after  | sort -u))

          echo "Entries loaded from the 1Password environment:"
          echo
          if [ -z "$new_vars" ]; then
            echo "  (none found — check OP_ENVIRONMENT_ID / OP_WORKLOAD_ID)"
          fi

          # Print each entry. GitHub auto-masks registered secret values, so the
          # value shows as *** in the log; the length confirms it was injected.
          for name in $new_vars; do
            value="${!name}"
            echo "  $name = $value   (length: ${#value})"
          done

          echo
          echo "Done. (Secret values appear as *** in logs due to GitHub masking.)"
